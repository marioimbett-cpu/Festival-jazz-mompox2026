<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<sc-if value="{{ countdown.started }}" hint-placeholder-val="{{ false }}">
  <div style="font-family:'Playfair Display',serif; font-size:34px; color:#FFD447; padding:20px 0;">¡El Festival ha comenzado!</div>
</sc-if>
<sc-if value="{{ countdown.notStarted }}" hint-placeholder-val="{{ true }}">
  <div style="position:relative; display:grid; grid-template-columns:repeat(4,1fr); gap:28px; max-width:760px; margin:14px auto 0;" class="countdown-grid">
    <div style="position:relative; overflow:hidden; background:linear-gradient(160deg, rgba(58,45,128,.55), rgba(15,14,51,.75)); border:1.5px solid rgba(244,175,55,.5); border-radius:22px; padding:32px 20px; box-shadow:0 18px 44px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.10); animation:revealUp .8s cubic-bezier(.22,.8,.36,1) both, cdGlow 3s ease-in-out infinite; transition:transform .4s ease, border-color .4s ease, box-shadow .4s ease; cursor:default; min-width:0;" class="cd-card" style-hover="transform:scale(1.05); border-color:#FFD447; box-shadow:0 18px 44px rgba(0,0,0,.45), 0 0 30px rgba(212,175,55,.35), inset 0 1px 0 rgba(255,255,255,.16);">
      <svg viewBox="0 0 200 200" style="position:absolute; inset:0; width:100%; height:100%; color:#F4C542; opacity:.14; pointer-events:none;"><use href="#filigreeMotif" x="10" y="10" width="180" height="180"></use></svg>
      <div key="{{ countdown.days }}" class="cd-number" style="position:relative; font-family:'Playfair Display',serif; font-size:62px; font-weight:900; color:#D4AF37; text-shadow:0 0 4px rgba(0,0,0,.5), 0 0 18px rgba(212,175,55,.65), 0 0 40px rgba(212,175,55,.3); animation:cdFlip .4s ease;">{{ countdown.days }}</div>
      <div class="cd-label" style="position:relative; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#FFFFFF; margin-top:10px; font-weight:600;">Días</div>
    </div>
    <div style="position:relative; overflow:hidden; background:linear-gradient(160deg, rgba(58,45,128,.55), rgba(15,14,51,.75)); border:1.5px solid rgba(244,175,55,.5); border-radius:22px; padding:32px 20px; box-shadow:0 18px 44px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.10); animation:revealUp .8s cubic-bezier(.22,.8,.36,1) .1s both, cdGlow 3s ease-in-out infinite .3s; transition:transform .4s ease, border-color .4s ease, box-shadow .4s ease; cursor:default; min-width:0;" class="cd-card" style-hover="transform:scale(1.05); border-color:#FFD447; box-shadow:0 18px 44px rgba(0,0,0,.45), 0 0 30px rgba(212,175,55,.35), inset 0 1px 0 rgba(255,255,255,.16);">
      <svg viewBox="0 0 200 200" style="position:absolute; inset:0; width:100%; height:100%; color:#F4C542; opacity:.14; pointer-events:none;"><use href="#filigreeMotif" x="10" y="10" width="180" height="180"></use></svg>
      <div key="{{ countdown.hours }}" class="cd-number" style="position:relative; font-family:'Playfair Display',serif; font-size:62px; font-weight:900; color:#D4AF37; text-shadow:0 0 4px rgba(0,0,0,.5), 0 0 18px rgba(212,175,55,.65), 0 0 40px rgba(212,175,55,.3); animation:cdFlip .4s ease;">{{ countdown.hours }}</div>
      <div class="cd-label" style="position:relative; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#FFFFFF; margin-top:10px; font-weight:600;">Horas</div>
    </div>
    <div style="position:relative; overflow:hidden; background:linear-gradient(160deg, rgba(58,45,128,.55), rgba(15,14,51,.75)); border:1.5px solid rgba(244,175,55,.5); border-radius:22px; padding:32px 20px; box-shadow:0 18px 44px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.10); animation:revealUp .8s cubic-bezier(.22,.8,.36,1) .2s both, cdGlow 3s ease-in-out infinite .6s; transition:transform .4s ease, border-color .4s ease, box-shadow .4s ease; cursor:default; min-width:0;" class="cd-card" style-hover="transform:scale(1.05); border-color:#FFD447; box-shadow:0 18px 44px rgba(0,0,0,.45), 0 0 30px rgba(212,175,55,.35), inset 0 1px 0 rgba(255,255,255,.16);">
      <svg viewBox="0 0 200 200" style="position:absolute; inset:0; width:100%; height:100%; color:#F4C542; opacity:.14; pointer-events:none;"><use href="#filigreeMotif" x="10" y="10" width="180" height="180"></use></svg>
      <div key="{{ countdown.minutes }}" class="cd-number" style="position:relative; font-family:'Playfair Display',serif; font-size:62px; font-weight:900; color:#D4AF37; text-shadow:0 0 4px rgba(0,0,0,.5), 0 0 18px rgba(212,175,55,.65), 0 0 40px rgba(212,175,55,.3); animation:cdFlip .4s ease;">{{ countdown.minutes }}</div>
      <div class="cd-label" style="position:relative; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#FFFFFF; margin-top:10px; font-weight:600;">Minutos</div>
    </div>
    <div style="position:relative; overflow:hidden; background:linear-gradient(160deg, rgba(58,45,128,.55), rgba(15,14,51,.75)); border:1.5px solid rgba(244,175,55,.5); border-radius:22px; padding:32px 20px; box-shadow:0 18px 44px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.10); animation:revealUp .8s cubic-bezier(.22,.8,.36,1) .3s both, cdGlow 3s ease-in-out infinite .9s; transition:transform .4s ease, border-color .4s ease, box-shadow .4s ease; cursor:default; min-width:0;" class="cd-card" style-hover="transform:scale(1.05); border-color:#FFD447; box-shadow:0 18px 44px rgba(0,0,0,.45), 0 0 30px rgba(212,175,55,.35), inset 0 1px 0 rgba(255,255,255,.16);">
      <svg viewBox="0 0 200 200" style="position:absolute; inset:0; width:100%; height:100%; color:#F4C542; opacity:.14; pointer-events:none;"><use href="#filigreeMotif" x="10" y="10" width="180" height="180"></use></svg>
      <div key="{{ countdown.seconds }}" class="cd-number" style="position:relative; font-family:'Playfair Display',serif; font-size:62px; font-weight:900; color:#D4AF37; text-shadow:0 0 4px rgba(0,0,0,.5), 0 0 18px rgba(212,175,55,.65), 0 0 40px rgba(212,175,55,.3); animation:cdFlip .4s ease;">{{ countdown.seconds }}</div>
      <div class="cd-label" style="position:relative; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#FFFFFF; margin-top:10px; font-weight:600;">Segundos</div>
    </div>
  </div>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { now: Date.now() };

  componentDidMount() {
    this._tick = setInterval(() => this.setState({ now: Date.now() }), 1000);
  }
  componentWillUnmount() {
    clearInterval(this._tick);
  }

  renderVals() {
    const target = new Date(this.props.targetDate || '2026-09-03T00:00:00-05:00').getTime();
    const diff = target - this.state.now;
    const started = diff <= 0;
    const pad = n => String(n).padStart(2, '0');
    let countdown;
    if (started) {
      countdown = { started: true, notStarted: false, days: '00', hours: '00', minutes: '00', seconds: '00' };
    } else {
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);
      countdown = { started: false, notStarted: true, days: pad(days), hours: pad(hours), minutes: pad(minutes), seconds: pad(seconds) };
    }
    return { countdown };
  }
}

</script>
</body>
</html>
